<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FFFFFF;
    --warm-white: #FFFFFF;
    --terra: #1A6DB5;
    --terra-dark: #145A99;
    --terra-light: #4A9DD4;
    --slate: #0B1F3A;
    --slate-light: #2E5A84;
    --sage: #6A9FC0;
    --muted: #4A6E8A;
    --border: #B8D4EA;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--warm-white);
    color: var(--slate);
    line-height: 1.7; font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    height: 72px; display: flex; align-items: center;
    padding: 0 8%; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.5rem; font-weight: 600;
    color: var(--slate); letter-spacing: 0.01em; text-decoration: none;
  }
  .logo span { color: var(--terra); }
  main { max-width: 760px; margin: 0 auto; padding: 5rem 5% 8rem; }
  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 700; letter-spacing: -0.02em;
    color: var(--slate); margin-bottom: 3rem; line-height: 1.15;
    padding-bottom: 2rem; border-bottom: 1px solid var(--border);
  }
  h2 {
    font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 700;
    color: var(--slate); margin: 2.5rem 0 0.6rem;
  }
  p { color: var(--slate-light); font-weight: 300; margin-bottom: 0.4rem; font-size: 0.95rem; }
  a { color: var(--terra); text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer {
    background: var(--slate); color: var(--sage);
    padding: 3rem 8%; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 1.5rem;
  }
  .footer-logo { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; color: #fff; }
  .footer-logo span { color: var(--terra-light); }
  .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .footer-links a { text-decoration: none; color: var(--sage); font-size: 0.85rem; font-weight: 300; transition: color 0.2s; }
  .footer-links a:hover { color: #fff; }
  .footer-bottom {
    background: var(--slate); padding: 1.25rem 8%;
    border-top: 1px solid rgba(180,210,240,0.12);
    font-size: 0.8rem; color: var(--muted);
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;
  }
</style>
</head>
