<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — Cuidesa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #F5F0E8;
    --warm-white: #FAF7F2;
    --terra: #C4634A;
    --slate: #1E2D2F;
    --slate-light: #4A6266;
    --muted: #6B7E80;
    --border: #D8D0C4;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--warm-white);
    color: var(--slate);
    line-height: 1.7;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    height: 72px; display: flex; align-items: center;
    padding: 0 8%; border-bottom: 1px solid var(--border);
    background: rgba(250,247,242,0.95);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.5rem; font-weight: 600;
    color: var(--slate); letter-spacing: 0.01em;
    text-decoration: none;
  }
  .logo span { color: var(--terra); }
  main {
    max-width: 760px; margin: 0 auto;
    padding: 5rem 2rem 8rem;
  }
  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 700; letter-spacing: -0.02em;
    color: var(--slate); margin-bottom: 3rem; line-height: 1.15;
    padding-bottom: 2rem; border-bottom: 1px solid var(--border);
  }
  h2 {
    font-family: 'Lora', serif;
    font-size: 1.1rem; font-weight: 700;
    color: var(--slate); margin: 2.5rem 0 0.6rem;
  }
  p {
    color: var(--slate-light); font-weight: 300;
    margin-bottom: 0.4rem; font-size: 0.95rem;
  }
  a { color: var(--terra); text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer {
    text-align: center; padding: 2rem;
    border-top: 1px solid var(--border);
    background: var(--cream);
    font-size: 0.8rem; color: var(--muted);
    display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap;
  }
  footer a { color: var(--slate-light); text-decoration: none; font-weight: 400; transition: color 0.2s; }
  footer a:hover { color: var(--terra); }
</style>
</head>
<body>

</html>
