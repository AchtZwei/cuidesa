<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Impressum — Cuidesa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #FFFFFF;
    --warm-white: #FFFFFF;
    --terra: #1A6DB5;
    --terra-dark: #145A99;
    --terra-light: #4A9DD4;
    --slate: #0B1F3A;
    --slate-light: #2E5A84;
    --sage: #6A9FC0;
    --muted: #4A6E8A;
    --border: #B8D4EA;
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--warm-white);
    color: var(--slate);
    line-height: 1.7; font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  nav {
    position: sticky; top: 0; z-index: 100;
    height: 72px; display: flex; align-items: center; justify-content: space-between;
    padding: 0 8%; border-bottom: 1px solid var(--border);
    background: rgba(255,255,255,0.95); backdrop-filter: blur(12px);
  }
  .logo {
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.5rem; font-weight: 600;
    color: var(--slate); letter-spacing: 0.01em; text-decoration: none;
  }
  .logo span { color: var(--terra); }
  .lang-switcher { position: relative; }
  .lang-btn {
    background: none; border: 1px solid var(--border); cursor: pointer;
    font-family: 'Source Sans 3', sans-serif; font-size: 0.8rem; font-weight: 600;
    color: var(--slate); padding: 0.35rem 0.75rem; border-radius: 2px;
    display: flex; align-items: center; gap: 0.35rem; letter-spacing: 0.05em;
    transition: border-color 0.2s, color 0.2s;
  }
  .lang-btn:hover { border-color: var(--terra); color: var(--terra); }
  .lang-arrow { font-size: 0.6rem; }
  .lang-menu {
    display: none; position: absolute; top: calc(100% + 6px); right: 0;
    background: #fff; border: 1px solid var(--border); border-radius: 2px;
    box-shadow: 0 4px 16px rgba(11,31,58,0.1); min-width: 110px; z-index: 200;
  }
  .lang-menu.open { display: block; }
  .lang-opt {
    display: block; width: 100%; text-align: left; background: none; border: none;
    cursor: pointer; font-family: 'Source Sans 3', sans-serif; font-size: 0.82rem;
    font-weight: 500; color: var(--slate); padding: 0.55rem 1rem; transition: background 0.15s;
  }
  .lang-opt:hover { background: #f5f9ff; color: var(--terra); }
  .lang-opt.active { color: var(--terra); font-weight: 600; }
  main { max-width: 760px; margin: 0 auto; padding: 5rem 5% 8rem; }
  h1 {
    font-family: 'Lora', serif;
    font-size: clamp(1.8rem, 4vw, 2.5rem);
    font-weight: 700; letter-spacing: -0.02em;
    color: var(--slate); margin-bottom: 3rem; line-height: 1.15;
    padding-bottom: 2rem; border-bottom: 1px solid var(--border);
  }
  h2 {
    font-family: 'Lora', serif; font-size: 1.1rem; font-weight: 700;
    color: var(--slate); margin: 2.5rem 0 0.6rem;
  }
  p { color: var(--slate-light); font-weight: 300; margin-bottom: 0.4rem; font-size: 0.95rem; }
  a { color: var(--terra); text-decoration: none; }
  a:hover { text-decoration: underline; }
  footer {
    background: var(--slate); color: var(--sage);
    padding: 3rem 8%; display: flex; justify-content: space-between;
    align-items: center; flex-wrap: wrap; gap: 1.5rem;
  }
  .footer-logo { font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; color: #fff; }
  .footer-logo span { color: var(--terra-light); }
  .footer-links { display: flex; gap: 1.5rem; flex-wrap: wrap; }
  .footer-links a { text-decoration: none; color: #fff; font-size: 0.85rem; font-weight: 300; transition: color 0.2s; }
  .footer-links a:hover { color: #fff; }
  .footer-bottom {
    background: var(--slate); padding: 1.25rem 8%;
    border-top: 1px solid rgba(180,210,240,0.12);
    font-size: 0.8rem; color: #fff;
    display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 0.5rem;
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="/"><span>Cuide</span>sa</a>
  <div class="lang-switcher">
    <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">
      <span id="langLabel">DE</span><span class="lang-arrow">▾</span>
    </button>
    <div class="lang-menu" id="langMenu">
      <button class="lang-opt active" onclick="setLang('de')">🇩🇪 Deutsch</button>
      <button class="lang-opt" onclick="setLang('al')">🇦🇱 Shqip</button>
    </div>
  </div>
</nav>

<main>
  <h1 data-i18n="h1">Impressum</h1>

  <h2 data-i18n="s1h">Betreiber</h2>
  <p>Ermir Krasniqi</p>
  <p>Obere Neustrasse 4</p>
  <p data-i18n="country">Schweiz</p>

  <h2 data-i18n="s2h">Kontakt</h2>
  <p>Telefon: <a href="tel:+41766986236">+41 76 698 62 36</a></p>
  <p>E-Mail: <a href="mailto:info@cuidesa.ch">info@cuidesa.ch</a></p>
</main>

<footer>
  <div class="footer-logo"><span>Cuide</span>sa</div>
  <div class="footer-links">
    <a href="/" data-i18n="f.home">Startseite</a>
    <a href="/datenschutz.html" data-i18n="f.privacy">Datenschutz</a>
    <a href="/agb.html" data-i18n="f.agb">AGB</a>
    <a href="mailto:info@cuidesa.ch">info@cuidesa.ch</a>
  </div>
</footer>
<div class="footer-bottom">
  <div data-i18n="f.copy">© 2025 Cuidesa. Alle Rechte vorbehalten.</div>
  <div data-i18n="f.tag">Für pflegende Angehörige in der Schweiz</div>
</div>

<script>
  let currentLang = 'de';
  const T = {
    de: {
      h1: 'Impressum', s1h: 'Betreiber', s2h: 'Kontakt', country: 'Schweiz',
      'f.home': 'Startseite', 'f.privacy': 'Datenschutz', 'f.agb': 'AGB',
      'f.copy': '© 2025 Cuidesa. Alle Rechte vorbehalten.',
      'f.tag': 'Für pflegende Angehörige in der Schweiz'
    },
    al: {
      h1: 'Impresum', s1h: 'Operatori', s2h: 'Kontakt', country: 'Zvicër',
      'f.home': 'Faqja Kryesore', 'f.privacy': 'Privatësia', 'f.agb': 'KPG',
      'f.copy': '© 2025 Cuidesa. Të gjitha të drejtat e rezervuara.',
      'f.tag': 'Për të afërmit kujdestarë në Zvicër'
    }
  };

  function setLang(lang) {
    currentLang = lang;
    document.getElementById('langLabel').textContent = lang === 'al' ? 'AL' : 'DE';
    document.querySelectorAll('.lang-opt').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.lang-opt').forEach(b => {
      if ((lang === 'de' && b.textContent.includes('Deutsch')) || (lang === 'al' && b.textContent.includes('Shqip'))) b.classList.add('active');
    });
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const v = T[lang][el.getAttribute('data-i18n')];
      if (v !== undefined) el.textContent = v;
    });
    closeLangMenu();
  }
  function toggleLangMenu() { document.getElementById('langMenu').classList.toggle('open'); }
  function closeLangMenu() { document.getElementById('langMenu').classList.remove('open'); }
  document.addEventListener('click', e => { if (!e.target.closest('.lang-switcher')) closeLangMenu(); });
</script>
</body>
</html>
